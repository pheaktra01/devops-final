- name: Deploy Spring Boot App on Web Server
  hosts: web
  become: yes

  vars:
    app_dir: /opt/idcard-app

  tasks:

  # 1. Update code (git pull)
  - name: Ensure repo exists
    git:
      repo: "https://github.com/pheaktra01/devops-final.git"
      dest: "{{ app_dir }}"
      version: main
      force: yes

  - name: Reset local changes (safe pull)
    shell: |
      cd {{ app_dir }}
      git reset --hard
      git clean -fd
      git pull origin main

  # 2. Build project
  - name: Build project (skip tests for deployment)
    shell: |
      cd {{ app_dir }}
      mvn clean package -DskipTests

  # 3. Backup MySQL database
  - name: Backup MySQL database
    shell: |
      mysqldump -u root -pHello@123 GA-loengpheaktra-db > /tmp/backup.sql